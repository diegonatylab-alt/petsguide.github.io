name: Publicar artículo diario

on:
  schedule:
    # Todos los días a las 8:00 AM UTC (5:00 AM Argentina)
    - cron: '0 8 * * 1,4'
  workflow_dispatch:   # permite ejecutarlo manualmente desde GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Generar artículo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python generate_article.py

      - name: Publicar cambios en GitHub
        run: |
          git config user.name "PetsGuía Bot"
          git config user.email "bot@petsguia.com"
          git add index.html
          git add articulos/ || true
          git diff --staged --quiet || git commit -m "🐾 Artículo del día $(date +'%Y-%m-%d')"
          git push
          git push
